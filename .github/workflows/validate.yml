name: Validate Poems

on:
  pull_request:
    paths:
      - "app/src/data/poems.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate poems.json
        run: node scripts/validate-poems.mjs
