name: Auto Add Poem

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      genre:
        description: "Genre filter"
        type: choice
        required: false
        default: any
        options:
          - any
          - 俳句
          - 短歌
          - 詩

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  suggest-and-pr:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install OpenAI SDK
        run: npm install openai

      - name: Suggest poem
        id: suggest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GENRE_FILTER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.genre != 'any' && github.event.inputs.genre || '' }}
        run: |
          set +e
          output="$(node scripts/suggest-poem.mjs 2>&1)"
          exit_code=$?
          set -e

          result="$(printf '%s\n' "$output" | tail -n 1)"
          if [ -z "$result" ]; then
            result='{"added":false,"reason":"No JSON output from suggest-poem.mjs"}'
          fi

          echo "$output"
          echo "result=$result" >> "$GITHUB_OUTPUT"
          exit "$exit_code"

      - name: Create branch, commit, and open PR
        if: ${{ fromJSON(steps.suggest.outputs.result).added == true }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          RESULT: ${{ steps.suggest.outputs.result }}
        run: |
          set -euo pipefail

          branch="auto/add-poem-$(date +%Y%m%d-%H%M%S)"

          author="$(node -e 'const r=JSON.parse(process.env.RESULT); process.stdout.write(r.poem.author);')"
          title8="$(node -e 'const r=JSON.parse(process.env.RESULT); const body=String(r.poem.body||"").replace(/\n/g,""); process.stdout.write(body.slice(0,8));')"
          commit_message="feat: ${author}「${title8}」を追加"
          pr_title="feat: ${author}の作品を自動追加"

          node -e 'const fs=require("node:fs"); const r=JSON.parse(process.env.RESULT); const p=r.poem; const body=["## 自動追加された作品","","- 作者: "+(p.author??"N/A"),"- 年: "+(p.year===null?"null":String(p.year)),"- ジャンル: "+(p.genre??"null"),"- 出典: "+(p.source??"null"),"","### 本文","```",""+(p.body??""),"```","","_This PR was auto-generated by GitHub Actions._",""].join("\n"); fs.writeFileSync("pr_body.md", body, "utf8");'

          git checkout -b "$branch"
          git add app/src/data/poems.json
          git commit -m "$commit_message"
          git push -u origin "$branch"

          gh label create auto-generated --color "0e8a16" --description "Automated content generation" || true
          gh pr create --title "$pr_title" --body-file pr_body.md --label auto-generated

      - name: No poem added
        if: ${{ fromJSON(steps.suggest.outputs.result).added != true }}
        run: |
          echo "No poem added."
          echo "Reason: ${{ fromJSON(steps.suggest.outputs.result).reason }}"
